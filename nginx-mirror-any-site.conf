  location @preflight {
    internal;
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    add_header 'Access-Control-Max-Age' 1728000; # Preflight cache 20 days
    add_header 'Content-Type' 'text/plain; charset=utf-8' always;
    add_header 'Content-Length' 0 always;
    return 204;
  }
  location @handle_redirect {
    internal;  
    set $redirect_location $upstream_http_location; 
    
    set $modified_location "";
    if ($redirect_location ~* "^https?://authelia(.*)$") {
      return 302 $redirect_location;
    }
    if ($redirect_location ~* "^https?://(.*)$") {
      set $modified_location "https://test.top/$RAND_PREFIX/https/$1";
    }
    # If no match is found, revert to the original value
    if ($modified_location = "") {
      set $modified_location $redirect_location;
    }
    return 302 $modified_location;  
  }

