    sub_filter "https://$target_domain" "https://test.top/$RAND_PREFIX/https/$target_domain";
    sub_filter "http://$target_domain" "https://test.top/$RAND_PREFIX/https/$target_domain";
    sub_filter "https://" "https://test.top/$RAND_PREFIX/https/";
    sub_filter "src=\"//" "src=\"https://test.top/$RAND_PREFIX/https/";
    sub_filter "src=\"/" "src=\"https://test.top/$RAND_PREFIX/https/$target_domain/";
    sub_filter "srcset=\"//" "src=\"https://test.top/$RAND_PREFIX/https/";
    sub_filter "srcset=\"/" "src=\"https://test.top/$RAND_PREFIX/https/$target_domain/";
    sub_filter "href=\"//" "href=\"https://test.top/$RAND_PREFIX/https/";
    sub_filter "href=\"/" "href=\"https://test.top/$RAND_PREFIX/https/$target_domain/";
    sub_filter "action=\"//" "action=\"https://test.top/$RAND_PREFIX/https/";
    sub_filter "action=\"/" "action=\"https://test.top/$RAND_PREFIX/https/$target_domain/";
    sub_filter "src=\"./" "src=\"https://test.top/$RAND_PREFIX/https/$target_domain/";
    sub_filter "href=\"./" "href=\"https://test.top/$RAND_PREFIX/https/$target_domain/";
    sub_filter "action=\"./" "action=\"https://test.top/$RAND_PREFIX/https/$target_domain/";
    sub_filter "integrity=\"" "foo=\"";
    sub_filter ".integrity=" ".foo=";
    sub_filter ".integrity =" ".foo=";
