server {
  listen 80;
  server_name test.top;

  return 301 https://\$host\$request_uri;
}

server {
  listen 443 ssl;
  server_name test.top;
  
  # SSL certificate
  ssl_certificate /etc/letsencrypt/live/test.top/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/test.top/privkey.pem;
  
  # Authelia Integration
  include /etc/nginx/snippets/authelia.conf;

  set $RAND_PREFIX "LBo5";
  large_client_header_buffers 8 128k;
  client_header_buffer_size 256k;

  location = / {
    auth_request /authelia-verify;  # Call the internal authelia authentication endpoint
    error_page 403 =302 https://authelia.top/logout?rd=https://authelia.top/?rd=$scheme://$http_host$request_uri;
    error_page 401 =302 https://authelia.top/?rd=$scheme://$http_host$request_uri;

    proxy_pass https://test.top/landing-QIf2NE45tmVLe8Hm2b3ZDwkSqrGcEzrr;
  }
  location = /landing-QIf2NE45tmVLe8Hm2b3ZDwkSqrGcEzrr { return 301 https://test.top/$RAND_PREFIX/https/example.com; }

  location / {  
    auth_request /authelia-verify;  # Call the internal authelia authentication endpoint
    error_page 403 =302 https://authelia.top/logout?rd=https://authelia.top/?rd=$scheme://$http_host$request_uri;
    error_page 401 =302 https://authelia.top/?rd=$scheme://$http_host$request_uri;

  proxy_pass https://test.top/404-QIf2NE45tmVLe8Hm2b3ZDwkSqrGcEzrr ;
  }
  location /404-QIf2NE45tmVLe8Hm2b3ZDwkSqrGcEzrr {  return 404;  }

  location @error {
    internal;  
    if ($authelia-failed = "403") {
      return 302 https://authelia.top/logout?rd=https://authelia.top/?rd=$scheme://$http_host$request_uri;
    }
    if ($authelia-failed = "401") {
      return 302 https://authelia.top/?rd=$scheme://$http_host$request_uri;
    }
    if ($status = 401) {return 401;}
    if ($status = 403) {return 403;}
  }

  location @bad-gateway  {
    return 302 "https://player.bilibili.com/player.html?isOutside=true&bvid=BV1y54y1s74a&t=58#$scheme://$host$request_uri";
  }
  #location ~ ^/LBo5/https/(?<target_domain>[^/]+)(?<target_path>/[^.]*)(?:\.(?<extension>html|htm))?$ {
  location ~ ^/LBo5/https/(?<target_domain>[^/]+)(?<target_path1>.*/)?(?<target_path2>[^./]*)?(?<extension>\.(html|htm))?$ {
    set $RAND_PREFIX "LBo5";
    set $target_scheme "https";
    set $target_path "$target_path1$target_path2$extension";
    set $real_target_path $target_path;
    #if ($extension = "") {set $real_target_path $target_path;}
    if ($target_path = "") {set $real_target_path "/";}
    set $target_url "$target_scheme://$target_domain$real_target_path$is_args$args";
    auth_request /authelia-verify;  # Call the internal authelia authentication endpoint
    error_page 403 401 = @error;
    
    resolver 8.8.8.8 8.8.4.4 ipv6=off valid=30s;
    #return 302 "https://example.com/$target_url";
    proxy_pass $target_url;
    error_page 301 302 = @handle_redirect; 
    error_page 502 = @bad-gateway;
    proxy_intercept_errors on;  # Enable error interception
    proxy_ssl_server_name on;        # enableSNI
    proxy_ssl_name $target_domain;
  
    proxy_set_header Host $target_domain;
    proxy_set_header Referer "";
    proxy_set_header Origin "$target_scheme://$target_domain";
    proxy_set_header X-Real-IP localhost;
    client_max_body_size 20G;
    proxy_set_header Accept-Encoding "";


    proxy_buffer_size 128k;        # Increase proxy buffer
    proxy_buffers 4 256k;        # Increase the buffer size of the proxy cache
    proxy_busy_buffers_size 256k;

    # 4. Resolving cross-domain issues: Add CORS headers
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

    # 5. Handling OPTIONS preflight requests
    if ($request_method = OPTIONS) {rewrite ^(.*)$ @preflight break;}
    
    # 6.Content Security Policy (CSP header)
    proxy_hide_header Content-Security-Policy;
    add_header Content-Security-Policy "";

    # 7. Disable proxy caching for easier debugging (can be enabled in production environments).
    proxy_buffering off;
    proxy_cache off;

